<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devocional de hoy - Julio 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5e6d3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            color: #3e2723;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
        }
        
        .libro {
            max-width: 500px;
            width: 100%;
            background: #fff9f0;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 0 0 12px #8b5e3c, 0 0 0 15px #5d3a1a;
            padding: 30px 25px;
            position: relative;
            text-align: center;
        }
        
        .cabecera {
            margin-bottom: 20px;
            border-bottom: 2px solid #c9a87c;
            padding-bottom: 15px;
        }
        
        .cabecera h1 {
            font-size: 1.6em;
            color: #5d3a1a;
        }
        
        .cabecera .fecha {
            font-style: italic;
            color: #8b5e3c;
            font-size: 1.3em;
            margin-top: 5px;
        }
        
        .imagen-container {
            position: relative;
            display: inline-block;
            margin: 15px 0;
            width: 100%;
        }
        
        .imagen-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 5px solid #f0dcc5;
            pointer-events: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
            display: block;
        }
        
        .overlay-proteccion {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
            pointer-events: all;
            cursor: default;
        }
        
        .marca-agua {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 2.5em;
            color: rgba(0, 0, 0, 0.06);
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
            z-index: 5;
            letter-spacing: 5px;
        }
        
        .aviso {
            margin-top: 20px;
            padding: 12px;
            background: #faf0e6;
            border: 1px solid #c9a87c;
            border-radius: 8px;
            font-size: 0.85em;
            color: #6d4c41;
            line-height: 1.5;
        }
        
        .aviso strong {
            color: #5d3a1a;
        }

        .mensaje-espera {
            padding: 40px 20px;
            color: #8b5e3c;
            font-size: 1.1em;
        }

        .protegido {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Ocultar imagen si hay error */
        .img-error {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="libro protegido">
        <div class="cabecera">
            <h1>📖 Grupo Bondad </h1>
            <p class="fecha" id="fechaHoy"></p>
        </div>
        
        <div class="imagen-container" id="imagenContainer">
            <img id="imagenDia" src="" alt="Devocional de hoy" draggable="false">
            <div class="overlay-proteccion" id="overlay"></div>
            <div class="marca-agua">DEVOCIONARIO</div>
            <p class="mensaje-espera" id="mensajeEspera" style="display:none;">
                📖 El devocionario de julio 2026 estará disponible próximamente.
            </p>
        </div>
        
        <div class="aviso">
            <strong>⚡ Material protegido</strong><br>
            Este contenido es para uso personal. 
            No descargar, copiar ni distribuir sin autorización.
        </div>
    </div>

    <script>
        (function() {
            // Configuración
            const MES_OBJETIVO = 7; // Julio
            const AÑO_OBJETIVO = 2026;
            const DIAS_MES = 31;
            
            // Elementos
            const fechaHoy = document.getElementById('fechaHoy');
            const imagenDia = document.getElementById('imagenDia');
            const mensajeEspera = document.getElementById('mensajeEspera');
            const marcaAgua = document.querySelector('.marca-agua');
            const overlay = document.getElementById('overlay');
            
            // Fecha actual
            const hoy = new Date();
            const dia = hoy.getDate();
            const mes = hoy.getMonth() + 1;
            const año = hoy.getFullYear();
            
            // Verificar si es julio 2026
            const esJulio2026 = (mes === MES_OBJETIVO && año === AÑO_OBJETIVO);
            const diaValido = (dia >= 1 && dia <= DIAS_MES);
            
            function mostrarDevocional() {
                fechaHoy.textContent = `${dia} de julio de ${año}`;
                imagenDia.src = `${dia}-de-julio.webp`;
                imagenDia.alt = `Devocional ${dia} de julio`;
                imagenDia.style.display = 'block';
                marcaAgua.style.display = 'block';
                overlay.style.display = 'block';
                mensajeEspera.style.display = 'none';
            }
            
            function mostrarEspera() {
                fechaHoy.textContent = '📅 Julio 2026';
                imagenDia.style.display = 'none';
                marcaAgua.style.display = 'none';
                overlay.style.display = 'none';
                mensajeEspera.style.display = 'block';
            }
            
            // Cargar según fecha
            if (esJulio2026 && diaValido) {
                mostrarDevocional();
                
                // Si la imagen no carga, mostrar mensaje
                imagenDia.onerror = function() {
                    this.style.display = 'none';
                    marcaAgua.style.display = 'none';
                    overlay.style.display = 'none';
                    mensajeEspera.style.display = 'block';
                    mensajeEspera.textContent = '📖 Imagen no disponible. Intenta más tarde.';
                };
            } else {
                mostrarEspera();
            }
            
            // ==================== PROTECCIONES ====================
            
            // 1. Bloquear clic derecho
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                alert('⚠️ Este contenido está protegido.');
            });
            
            // 2. Bloquear arrastrar imágenes
            document.addEventListener('dragstart', function(e) {
                if (e.target.tagName === 'IMG') {
                    e.preventDefault();
                    alert('⚠️ No está permitido arrastrar imágenes.');
                }
            });
            
            // 3. Bloquear Ctrl+S, Ctrl+C, Ctrl+U, Ctrl+Shift+I
            document.addEventListener('keydown', function(e) {
                const ctrl = e.ctrlKey || e.metaKey;
                const key = e.key.toLowerCase();
                
                // Bloquear combinaciones peligrosas
                if (ctrl && ['s', 'c', 'u', 'p'].includes(key)) {
                    e.preventDefault();
                    alert('⚠️ Acción no permitida.');
                    return;
                }
                
                // Bloquear F12
                if (e.key === 'F12') {
                    e.preventDefault();
                    alert('⚠️ Herramientas de desarrollo deshabilitadas.');
                    return;
                }
                
                // Bloquear Ctrl+Shift+I
                if (ctrl && e.shiftKey && key === 'i') {
                    e.preventDefault();
                    alert('⚠️ Herramientas de desarrollo deshabilitadas.');
                    return;
                }
            });
            
            // 4. Bloquear selección de texto
            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
            });
            
            // 5. Detectar si se abren DevTools (opcional)
            let devtoolsOpen = false;
            const devtoolsCheck = function() {
                const threshold = 160;
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;
                
                if (widthDiff > threshold || heightDiff > threshold) {
                    if (!devtoolsOpen) {
                        devtoolsOpen = true;
                        // Opción: redirigir o mostrar mensaje
                        // window.location.href = 'about:blank';
                        alert('⚠️ Herramientas de desarrollo detectadas.');
                    }
                } else {
                    devtoolsOpen = false;
                }
            };
            
            // Verificar cada 2 segundos
            setInterval(devtoolsCheck, 2000);
            
            // 6. Prevenir que el usuario salga con clic derecho en la imagen
            document.querySelectorAll('img').forEach(img => {
                img.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    alert('⚠️ No está permitido descargar esta imagen.');
                });
            });
            
            console.log('✅ Devocionario cargado correctamente.');
            console.log(`📅 Hoy: ${dia} de julio de ${año}`);
        })();
    </script>
</body>
</html>
