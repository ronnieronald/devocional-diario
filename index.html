<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devocional de hoy - Julio 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5e6d3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            color: #3e2723;
            padding: 20px;
        }
        
        .libro {
            max-width: 500px;
            width: 100%;
            background: #fff9f0;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 0 0 12px #8b5e3c, 0 0 0 15px #5d3a1a;
            padding: 30px 25px;
            position: relative;
            text-align: center;
        }
        
        .cabecera {
            margin-bottom: 20px;
            border-bottom: 2px solid #c9a87c;
            padding-bottom: 15px;
        }
        
        .cabecera h1 {
            font-size: 1.6em;
            color: #5d3a1a;
        }
        
        .cabecera .fecha {
            font-style: italic;
            color: #8b5e3c;
            font-size: 1.3em;
            margin-top: 5px;
        }
        
        .imagen-container {
            position: relative;
            display: inline-block;
            margin: 15px 0;
            width: 100%;
        }
        
        .imagen-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 5px solid #f0dcc5;
            display: block;
        }
        
        .marca-agua {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 2.5em;
            color: rgba(0, 0, 0, 0.06);
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
            z-index: 5;
            letter-spacing: 5px;
        }
        
        .aviso {
            margin-top: 20px;
            padding: 12px;
            background: #faf0e6;
            border: 1px solid #c9a87c;
            border-radius: 8px;
            font-size: 0.85em;
            color: #6d4c41;
            line-height: 1.5;
        }
        
        .aviso strong {
            color: #5d3a1a;
        }

        .mensaje-espera {
            padding: 40px 20px;
            color: #8b5e3c;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="libro">
        <div class="cabecera">
            <h1>📖 Grupo Bondad</h1>
            <p class="fecha" id="fechaHoy"></p>
        </div>
        
        <div class="imagen-container" id="imagenContainer">
            <img id="imagenDia" src="" alt="Devocional de hoy">
            <div class="marca-agua">DEVOCIONARIO</div>
            <p class="mensaje-espera" id="mensajeEspera" style="display:none;">
                📖 El devocionario de julio 2026 estará disponible próximamente.
            </p>
        </div>
        
        <div class="aviso">
            <strong>⚡ Material protegido</strong><br>
            Este contenido es para uso personal. 
            No descargar, copiar ni distribuir sin autorización.
        </div>
    </div>

    <script>
        (function() {
            // Configuración
            const MES_OBJETIVO = 7; // Julio
            const AÑO_OBJETIVO = 2026;
            const DIAS_MES = 31;
            
            // Elementos
            const fechaHoy = document.getElementById('fechaHoy');
            const imagenDia = document.getElementById('imagenDia');
            const mensajeEspera = document.getElementById('mensajeEspera');
            const marcaAgua = document.querySelector('.marca-agua');
            
            // Fecha actual
            const hoy = new Date();
            const dia = hoy.getDate();
            const mes = hoy.getMonth() + 1;
            const año = hoy.getFullYear();
            
            // Verificar si es julio 2026
            const esJulio2026 = (mes === MES_OBJETIVO && año === AÑO_OBJETIVO);
            const diaValido = (dia >= 1 && dia <= DIAS_MES);
            
            function mostrarDevocional() {
                fechaHoy.textContent = `${dia} de julio de ${año}`;
                imagenDia.src = `${dia}-de-julio.webp`;
                imagenDia.alt = `Devocional ${dia} de julio`;
                imagenDia.style.display = 'block';
                marcaAgua.style.display = 'block';
                mensajeEspera.style.display = 'none';
            }
            
            function mostrarEspera() {
                fechaHoy.textContent = '📅 Julio 2026';
                imagenDia.style.display = 'none';
                marcaAgua.style.display = 'none';
                mensajeEspera.style.display = 'block';
            }
            
            // Cargar según fecha
            if (esJulio2026 && diaValido) {
                mostrarDevocional();
                
                // Si la imagen no carga, mostrar mensaje
                imagenDia.onerror = function() {
                    this.style.display = 'none';
                    marcaAgua.style.display = 'none';
                    mensajeEspera.style.display = 'block';
                    mensajeEspera.textContent = '📖 Imagen no disponible. Intenta más tarde.';
                };
            } else {
                mostrarEspera();
            }
            
            console.log('✅ Devocionario cargado correctamente.');
            console.log(`📅 Hoy: ${dia} de julio de ${año}`);
        })();
    </script>
</body>
</html>
